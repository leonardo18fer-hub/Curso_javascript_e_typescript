<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS & TS — Curso Completo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --js: #F7DF1E;
    --ts: #3178C6;
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --text: #e8e8f0;
    --muted: #7070a0;
    --green: #4ade80;
    --red: #f87171;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 100;
    display: flex; flex-direction: column;
    transition: transform 0.3s;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .logo-badges { display: flex; gap: 6px; }
  .badge-js {
    background: var(--js); color: #111; font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 12px; padding: 4px 8px; border-radius: 6px;
  }
  .badge-ts {
    background: var(--ts); color: #fff; font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 12px; padding: 4px 8px; border-radius: 6px;
  }
  .logo-title { font-size: 14px; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  .progress-bar-wrap {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .progress-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--js), var(--ts)); border-radius: 2px; transition: width 0.5s; }

  .section-header {
    padding: 18px 24px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .section-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-js { background: var(--js); }
  .dot-ts { background: var(--ts); }

  .nav-item {
    padding: 10px 24px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    border-left: 3px solid transparent;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
    line-height: 1.4;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--text); border-left-color: var(--js); background: var(--surface2); }
  .nav-item.active.ts-active { border-left-color: var(--ts); }
  .nav-item .check { font-size: 10px; margin-left: auto; color: var(--green); opacity: 0; }
  .nav-item.done .check { opacity: 1; }
  .nav-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--border); width: 20px; flex-shrink: 0; }

  /* MAIN */
  #main {
    margin-left: 280px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  #topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-size: 18px; font-weight: 800; }
  .topbar-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 4px 10px;
    border-radius: 20px; font-weight: 700;
  }
  .tag-js { background: rgba(247,223,30,0.15); color: var(--js); border: 1px solid rgba(247,223,30,0.3); }
  .tag-ts { background: rgba(49,120,198,0.15); color: #60a5fa; border: 1px solid rgba(49,120,198,0.3); }

  /* CONTENT */
  #content {
    padding: 48px;
    max-width: 900px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .lesson-hero {
    margin-bottom: 40px;
  }
  .lesson-chapter {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }
  .lesson-title {
    font-size: 36px; font-weight: 800; line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .lesson-title.js-title {
    background: linear-gradient(135deg, var(--js) 0%, #e6c800 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .lesson-title.ts-title {
    background: linear-gradient(135deg, #60a5fa 0%, var(--ts) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* THEORY CARD */
  .theory-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 28px;
    line-height: 1.8;
    font-size: 15px;
  }
  .theory-card h3 {
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .theory-card h3::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .theory-card p { color: #c0c0d8; margin-bottom: 14px; }
  .theory-card strong { color: var(--text); }
  .theory-card ul { list-style: none; padding: 0; }
  .theory-card ul li {
    padding: 6px 0 6px 20px; position: relative; color: #c0c0d8;
  }
  .theory-card ul li::before {
    content: '→'; position: absolute; left: 0; color: var(--js); font-size: 12px;
  }
  .theory-card.ts-card ul li::before { color: #60a5fa; }

  /* TABLE */
  .theory-table {
    width: 100%; border-collapse: collapse; margin: 16px 0;
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
  }
  .theory-table th {
    text-align: left; padding: 10px 14px;
    background: var(--surface2); color: var(--muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .theory-table td {
    padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #c0c0d8;
  }
  .theory-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* CODE BLOCK */
  .code-wrap {
    background: #0d0d15;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .code-header {
    padding: 12px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  }
  .code-lang.js { color: var(--js); }
  .code-lang.ts { color: #60a5fa; }
  .code-dots { display: flex; gap: 6px; }
  .code-dots span { width: 10px; height: 10px; border-radius: 50%; }
  .d1 { background: #ff5f57; }
  .d2 { background: #febc2e; }
  .d3 { background: #28c840; }
  .code-body {
    padding: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    color: #cdd6f4;
  }
  .c-comment { color: #6272a4; }
  .c-keyword { color: #ff79c6; }
  .c-string { color: #f1fa8c; }
  .c-num { color: #bd93f9; }
  .c-fn { color: #50fa7b; }
  .c-var { color: #8be9fd; }
  .c-type { color: #ffb86c; }

  /* QUIZ */
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 28px;
  }
  .quiz-label {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--js); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .quiz-label.ts-quiz { color: #60a5fa; }
  .quiz-question {
    font-size: 16px; font-weight: 700; margin-bottom: 24px;
    line-height: 1.6;
  }
  .quiz-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: #0d0d15;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin: 12px 0;
    color: #cdd6f4;
    display: block;
    white-space: pre;
  }
  .quiz-options { display: grid; gap: 10px; }
  .quiz-option {
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 12px;
    color: var(--text);
  }
  .quiz-option:hover:not(.disabled) { border-color: var(--js); background: rgba(247,223,30,0.05); }
  .quiz-option.ts-opt:hover:not(.disabled) { border-color: #60a5fa; background: rgba(49,120,198,0.05); }
  .quiz-option .opt-letter {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .quiz-option.correct { border-color: var(--green); background: rgba(74,222,128,0.08); color: var(--green); }
  .quiz-option.correct .opt-letter { background: var(--green); color: #0a0a0f; border-color: var(--green); }
  .quiz-option.wrong { border-color: var(--red); background: rgba(248,113,113,0.08); color: var(--red); }
  .quiz-option.wrong .opt-letter { background: var(--red); color: #0a0a0f; border-color: var(--red); }
  .quiz-option.disabled { cursor: default; pointer-events: none; }

  .quiz-explanation {
    margin-top: 20px; padding: 16px;
    background: var(--surface2); border-radius: 8px;
    border-left: 3px solid var(--green);
    font-size: 14px; color: #c0c0d8; line-height: 1.7;
    display: none;
  }
  .quiz-explanation.show { display: block; }
  .quiz-explanation strong { color: var(--green); }

  /* NAV BUTTONS */
  .lesson-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 32px 0;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  .btn {
    padding: 12px 24px; border-radius: 8px; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; border: none;
    transition: all 0.2s; display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.5px;
  }
  .btn-prev { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-prev:hover { color: var(--text); border-color: var(--muted); }
  .btn-next { background: var(--js); color: #111; }
  .btn-next:hover { transform: translateX(4px); box-shadow: 0 0 20px rgba(247,223,30,0.3); }
  .btn-next.ts-btn { background: var(--ts); color: #fff; }
  .btn-next.ts-btn:hover { box-shadow: 0 0 20px rgba(49,120,198,0.4); }

  /* HOME */
  .home-hero {
    padding: 80px 48px 60px;
    max-width: 900px;
  }
  .home-eyebrow {
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 20px;
  }
  .home-title {
    font-size: 64px; font-weight: 800; line-height: 1;
    margin-bottom: 24px;
  }
  .home-title span.y { color: var(--js); }
  .home-title span.b { color: #60a5fa; }
  .home-sub {
    font-size: 18px; color: var(--muted); line-height: 1.7;
    max-width: 540px; margin-bottom: 48px;
  }
  .home-grid {
    padding: 0 48px 48px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px; max-width: 900px;
  }
  .home-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer; transition: all 0.25s;
  }
  .home-card:hover { border-color: var(--js); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(247,223,30,0.1); }
  .home-card.ts-card-h:hover { border-color: var(--ts); box-shadow: 0 8px 32px rgba(49,120,198,0.1); }
  .home-card-icon { font-size: 28px; margin-bottom: 12px; }
  .home-card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .home-card-sub { font-size: 12px; color: var(--muted); }
  .home-card-tag { display: inline-block; margin-top: 12px; font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 4px; font-weight: 700; }
  .home-card-tag.js { background: rgba(247,223,30,0.15); color: var(--js); }
  .home-card-tag.ts { background: rgba(49,120,198,0.15); color: #60a5fa; }

  .tip-box {
    padding: 16px 20px;
    background: rgba(247,223,30,0.06);
    border: 1px solid rgba(247,223,30,0.2);
    border-radius: 8px;
    margin: 20px 0;
    font-size: 13px; color: #d0d0b8; line-height: 1.7;
  }
  .tip-box.ts-tip { background: rgba(49,120,198,0.06); border-color: rgba(49,120,198,0.2); color: #b0c8e8; }
  .tip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; color: var(--js); margin-bottom: 4px; }
  .tip-label.ts-tip { color: #60a5fa; }

  /* MOBILE */
  #hamburger {
    display: none; position: fixed; top: 16px; left: 16px; z-index: 200;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; cursor: pointer;
    font-size: 18px; color: var(--text);
  }
  @media (max-width: 768px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #main { margin-left: 0; }
    #hamburger { display: flex; }
    #content, .home-hero, .home-grid { padding-left: 20px; padding-right: 20px; }
    #topbar { padding: 16px 20px 16px 56px; }
    .home-title { font-size: 40px; }
  }
</style>
</head>
<body>

<button id="hamburger" onclick="toggleSidebar()">☰</button>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <div>
      <div class="logo-badges"><span class="badge-js">JS</span><span class="badge-ts">TS</span></div>
      <div class="logo-title" style="margin-top:8px">Curso Completo</div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label"><span>Progresso</span><span id="prog-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="nav-list"></div>
</aside>

<!-- MAIN -->
<main id="main">
  <div id="topbar">
    <div class="topbar-title" id="topbar-title">Início</div>
    <span class="topbar-tag tag-js" id="topbar-tag">JavaScript</span>
  </div>
  <div id="content"></div>
</main>

<script>
// ============================================================
// COURSE DATA
// ============================================================
const COURSE = [
  // ---- HOME
  { id: 'home', type: 'home', section: null },

  // ---- JAVASCRIPT
  {
    id: 'js-vars', type: 'js', section: 'JavaScript — Fundamentos',
    title: 'Variáveis: var, let e const', num: '01',
    theory: `<p>JavaScript tem três formas de declarar variáveis, cada uma com comportamento diferente de <strong>escopo</strong>, <strong>hoisting</strong> e <strong>reatribuição</strong>.</p>
      <table class="theory-table">
        <tr><th>Palavra-chave</th><th>Escopo</th><th>Hoisting</th><th>Redeclarar</th><th>Reatribuir</th></tr>
        <tr><td>var</td><td>função</td><td>sim (undefined)</td><td>sim</td><td>sim</td></tr>
        <tr><td>let</td><td>bloco</td><td>TDZ</td><td>não</td><td>sim</td></tr>
        <tr><td>const</td><td>bloco</td><td>TDZ</td><td>não</td><td>não</td></tr>
      </table>
      <p><strong>TDZ (Temporal Dead Zone):</strong> variáveis let/const existem no escopo, mas lançam ReferenceError se acessadas antes da declaração.</p>
      <ul>
        <li>Use <strong>const</strong> por padrão</li>
        <li>Use <strong>let</strong> quando precisar reatribuir</li>
        <li>Evite <strong>var</strong> em código moderno</li>
      </ul>`,
    code: `<span class="c-comment">// ❌ var — escopo de função, vaza do bloco</span>
<span class="c-keyword">var</span> <span class="c-var">x</span> = <span class="c-num">10</span>;
<span class="c-keyword">if</span> (<span class="c-keyword">true</span>) {
  <span class="c-keyword">var</span> <span class="c-var">x</span> = <span class="c-num">20</span>; <span class="c-comment">// sobrescreve!</span>
}
console.<span class="c-fn">log</span>(<span class="c-var">x</span>); <span class="c-comment">// 20 ⚠️</span>

<span class="c-comment">// ✅ let — escopo de bloco</span>
<span class="c-keyword">let</span> <span class="c-var">y</span> = <span class="c-num">10</span>;
<span class="c-keyword">if</span> (<span class="c-keyword">true</span>) {
  <span class="c-keyword">let</span> <span class="c-var">y</span> = <span class="c-num">20</span>; <span class="c-comment">// outro y!</span>
}
console.<span class="c-fn">log</span>(<span class="c-var">y</span>); <span class="c-comment">// 10 ✅</span>

<span class="c-comment">// ✅ const — referência imutável</span>
<span class="c-keyword">const</span> <span class="c-var">PI</span> = <span class="c-num">3.14159</span>;
<span class="c-comment">// PI = 3; ❌ TypeError!</span>

<span class="c-keyword">const</span> <span class="c-var">pessoa</span> = { nome: <span class="c-string">"Ana"</span> };
<span class="c-var">pessoa</span>.nome = <span class="c-string">"João"</span>; <span class="c-comment">// ✅ conteúdo pode mudar</span>
<span class="c-comment">// pessoa = {};  ❌ referência não pode mudar</span>`,
    lang: 'js',
    quiz: {
      question: 'O que é impresso?\n\nfor (var i = 0; i < 3; i++) {}\nconsole.log(i);',
      opts: ['undefined', 'ReferenceError', '3', '0'],
      answer: 2,
      exp: '<strong>var</strong> tem escopo de função, não de bloco. O <code>i</code> "vaza" para fora do loop e, ao final das 3 iterações, seu valor é 3.'
    }
  },
  {
    id: 'js-types', type: 'js', section: 'JavaScript — Fundamentos',
    title: 'Tipos de Dados', num: '02',
    theory: `<p>JavaScript é <strong>dinamicamente tipado</strong>: variáveis não têm tipo fixo. Os 7 tipos primitivos são:</p>
      <table class="theory-table">
        <tr><th>Tipo</th><th>Exemplo</th><th>typeof</th></tr>
        <tr><td>string</td><td>"texto"</td><td>"string"</td></tr>
        <tr><td>number</td><td>42, 3.14, NaN</td><td>"number"</td></tr>
        <tr><td>boolean</td><td>true, false</td><td>"boolean"</td></tr>
        <tr><td>undefined</td><td>undefined</td><td>"undefined"</td></tr>
        <tr><td>null</td><td>null</td><td>"object" ⚠️</td></tr>
        <tr><td>symbol</td><td>Symbol()</td><td>"symbol"</td></tr>
        <tr><td>bigint</td><td>9007n</td><td>"bigint"</td></tr>
      </table>
      <p><strong>Valores falsy:</strong> <code>false</code>, <code>0</code>, <code>""</code>, <code>null</code>, <code>undefined</code>, <code>NaN</code></p>`,
    code: `<span class="c-comment">// Tipos primitivos</span>
<span class="c-keyword">const</span> <span class="c-var">s</span> = <span class="c-string">"texto"</span>;         <span class="c-comment">// string</span>
<span class="c-keyword">const</span> <span class="c-var">n</span> = <span class="c-num">42</span>;             <span class="c-comment">// number</span>
<span class="c-keyword">const</span> <span class="c-var">b</span> = <span class="c-keyword">true</span>;           <span class="c-comment">// boolean</span>
<span class="c-keyword">const</span> <span class="c-var">u</span> = <span class="c-keyword">undefined</span>;      <span class="c-comment">// undefined</span>

// ============================================================
// STATE
// ============================================================
let currentId = 'home';
let done = new Set();
let quizAnswered = {};

// ============================================================
// NAV BUILD
// ============================================================
function buildNav() {
  const list = document.getElementById('nav-list');
  let lastSection = null;
  list.innerHTML = '';

  const home = document.createElement('div');
  home.className = 'nav-item' + (currentId === 'home' ? ' active' : '');
  home.innerHTML = `<span class="nav-num">🏠</span> Início`;
  home.onclick = () => navigate('home');
  list.appendChild(home);

  COURSE.filter(l => l.type !== 'home').forEach(lesson => {
    if (lesson.section !== lastSection) {
      lastSection = lesson.section;
      const h = document.createElement('div');
      const isTs = lesson.type === 'ts';
      h.className = 'section-header';
      h.innerHTML = `<span class="section-dot ${isTs ? 'dot-ts' : 'dot-js'}"></span>${lesson.section}`;
      list.appendChild(h);
    }
    const el = document.createElement('div');
    el.className = `nav-item${currentId === lesson.id ? ' active' + (lesson.type === 'ts' ? ' ts-active' : '') : ''}${done.has(lesson.id) ? ' done' : ''}`;
    el.innerHTML = `<span class="nav-num">${lesson.num}</span>${lesson.title}<span class="check">✓</span>`;
    el.onclick = () => navigate(lesson.id);
    list.appendChild(el);
  });

  updateProgress();
}

function updateProgress() {
  const total = COURSE.filter(l => l.type !== 'home').length;
  const pct = Math.round((done.size / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

// ============================================================
// RENDER
// ============================================================
function navigate(id) {
  currentId = id;
  buildNav();
  const lesson = COURSE.find(l => l.id === id);
  const content = document.getElementById('content');
  const topTitle = document.getElementById('topbar-title');
  const topTag = document.getElementById('topbar-tag');

  content.innerHTML = '';
  content.style.animation = 'none';
  requestAnimationFrame(() => { content.style.animation = ''; });

  if (id === 'home') {
    topTitle.textContent = 'Início';
    topTag.textContent = 'JS & TS';
    topTag.className = 'topbar-tag tag-js';
    renderHome(content);
    return;
  }

  topTitle.textContent = lesson.title;
  topTag.textContent = lesson.type === 'ts' ? 'TypeScript' : 'JavaScript';
  topTag.className = 'topbar-tag ' + (lesson.type === 'ts' ? 'tag-ts' : 'tag-js');

  renderLesson(content, lesson);
  window.scrollTo(0, 0);
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function renderHome(el) {
  const jsLessons = COURSE.filter(l => l.type === 'js');
  const tsLessons = COURSE.filter(l => l.type === 'ts');

  el.innerHTML = `
    <div class="home-hero">
      <div class="home-eyebrow">Curso Completo</div>
      <div class="home-title">
        <span class="y">Java</span><span class="y">Script</span><br>
        & <span class="b">Type</span><span class="b">Script</span>
      </div>
      <div class="home-sub">
        Do zero ao avançado. Teoria clara, exemplos reais e quizzes para fixar cada conceito.
      </div>
    </div>
    <div class="home-grid">
      ${jsLessons.map(l => `
        <div class="home-card" onclick="navigate('${l.id}')">
          <div class="home-card-icon">⚡</div>
          <div class="home-card-title">${l.title}</div>
          <div class="home-card-sub">${l.section.replace('JavaScript — ', '')}</div>
          <span class="home-card-tag js">JavaScript</span>
        </div>
      `).join('')}
      ${tsLessons.map(l => `
        <div class="home-card ts-card-h" onclick="navigate('${l.id}')">
          <div class="home-card-icon">🔷</div>
          <div class="home-card-title">${l.title}</div>
          <div class="home-card-sub">${l.section.replace('TypeScript — ', '')}</div>
          <span class="home-card-tag ts">TypeScript</span>
        </div>
      `).join('')}
    </div>`;
}

function renderLesson(el, lesson) {
  const isTs = lesson.type === 'ts';
  const allLessons = COURSE.filter(l => l.type !== 'home');
  const idx = allLessons.findIndex(l => l.id === lesson.id);
  const prev = allLessons[idx - 1];
  const next = allLessons[idx + 1];

  const qa = quizAnswered[lesson.id];
  const optsHtml = lesson.quiz.opts.map((opt, i) => {
    let cls = '';
    if (qa !== undefined) {
      if (i === lesson.quiz.answer) cls = 'correct disabled';
      else if (i === qa && qa !== lesson.quiz.answer) cls = 'wrong disabled';
      else cls = 'disabled';
    }
    return `<div class="quiz-option ${isTs ? 'ts-opt' : ''} ${cls}" onclick="answerQuiz('${lesson.id}', ${i})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>${opt}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div id="content" style="padding:48px;max-width:900px;animation:fadeIn 0.4s ease">
      <div class="lesson-hero">
        <div class="lesson-chapter">${lesson.section}</div>
        <div class="lesson-title ${isTs ? 'ts-title' : 'js-title'}">${lesson.title}</div>
      </div>

      <div class="theory-card ${isTs ? 'ts-card' : ''}">
        <h3>${isTs ? '🔷' : '⚡'} Teoria</h3>
        ${lesson.theory}
      </div>

      <div class="code-wrap">
        <div class="code-header">
          <div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div>
          <span class="code-lang ${lesson.lang}">${lesson.lang === 'ts' ? 'TypeScript' : 'JavaScript'}</span>
        </div>
        <div class="code-body">${lesson.code}</div>
      </div>

      <div class="quiz-card">
        <div class="quiz-label ${isTs ? 'ts-quiz' : ''}">🧠 Quiz — Teste seu conhecimento</div>
        <div class="quiz-question">${formatQuestion(lesson.quiz.question)}</div>
        <div class="quiz-options">${optsHtml}</div>
        <div class="quiz-explanation ${qa !== undefined ? 'show' : ''}" id="exp-${lesson.id}">
          <strong>${qa === lesson.quiz.answer ? '✅ Correto!' : '❌ Não desta vez.'}</strong> ${lesson.quiz.exp}
        </div>
      </div>

      <div class="lesson-nav">
        <button class="btn btn-prev" onclick="navigate('${prev ? prev.id : 'home'}')" ${!prev ? 'style="opacity:0.4"' : ''}>
          ← ${prev ? prev.title : 'Início'}
        </button>
        <button class="btn btn-next ${isTs ? 'ts-btn' : ''}" onclick="navigateAndMark('${lesson.id}', '${next ? next.id : 'home'}')">
          ${next ? next.title : 'Voltar ao Início'} →
        </button>
      </div>
    </div>`;
}

function formatQuestion(q) {
  const parts = q.split('\n');
  if (parts.length === 1) return q;
  let out = parts[0];
  const codeLines = parts.slice(1).filter(p => p.trim());
  if (codeLines.length) out += `<code class="quiz-code">${codeLines.join('\n')}</code>`;
  return out;
}

function answerQuiz(id, chosen) {
  if (quizAnswered[id] !== undefined) return;
  quizAnswered[id] = chosen;
  const lesson = COURSE.find(l => l.id === id);
  if (chosen === lesson.quiz.answer) done.add(id);
  navigate(id);
}

function navigateAndMark(fromId, toId) {
  done.add(fromId);
  navigate(toId);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// INIT
// ============================================================
buildNav();
navigate('home');
</script>
</body>
</html>
